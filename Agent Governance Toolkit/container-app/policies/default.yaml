version: "1.0"
name: default
description: Default governance policy for agent actions

rules:
  - name: block-shell-exec
    condition: "tool_name == 'shell_exec'"
    action: deny
    priority: 100

  - name: block-file-delete
    condition: "tool_name == 'file_delete'"
    action: deny
    priority: 100

  - name: block-drop-table
    condition: "tool_name == 'drop_table'"
    action: deny
    priority: 100

  - name: block-rm-rf
    condition: "tool_name == 'rm_rf'"
    action: deny
    priority: 100

  - name: block-format-disk
    condition: "tool_name == 'format_disk'"
    action: deny
    priority: 100

  - name: block-get-password
    condition: "tool_name == 'get_password'"
    action: deny
    priority: 100

  - name: block-dump-credentials
    condition: "tool_name == 'dump_credentials'"
    action: deny
    priority: 100

  - name: block-export-keys
    condition: "tool_name == 'export_keys'"
    action: deny
    priority: 100

  - name: allow-web-search
    condition: "tool_name == 'web_search'"
    action: allow
    priority: 10

  - name: allow-file-read
    condition: "tool_name == 'file_read'"
    action: allow
    priority: 10

  - name: allow-get-record
    condition: "tool_name == 'get_record'"
    action: allow
    priority: 10

  - name: allow-list-records
    condition: "tool_name == 'list_records'"
    action: allow
    priority: 10

  - name: allow-search
    condition: "tool_name == 'search'"
    action: allow
    priority: 10

  - name: log-all
    condition: "tool_name != ''"
    action: log
    priority: 1

defaults:
  action: deny
