<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--vscode-editor-background, #1e1e1e);
      color: var(--vscode-editor-foreground, #d4d4d4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    #carousel {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      max-width: 900px;
    }
    #frame {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    #frame img {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #caption {
      font-size: 0.85rem;
      opacity: 0.8;
      text-align: center;
      max-width: 600px;
    }
    button {
      background: var(--vscode-button-background, #0078d4);
      color: var(--vscode-button-foreground, #fff);
      border: none;
      border-radius: 4px;
      font-size: 1.5rem;
      width: 2.5rem;
      height: 2.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button:disabled {
      opacity: 0.3;
      cursor: default;
    }
    button:hover:not(:disabled) {
      background: var(--vscode-button-hoverBackground, #106ebe);
    }
    #counter {
      display: block;
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      opacity: 0.6;
    }
    #empty {
      text-align: center;
      opacity: 0.5;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div id="empty">Waiting for images...</div>
  <div id="carousel" hidden>
    <button id="prev" type="button" aria-label="Previous">&#8249;</button>
    <div id="frame">
      <div id="img-container"></div>
      <div id="caption"></div>
    </div>
    <button id="next" type="button" aria-label="Next">&#8250;</button>
  </div>
  <span id="counter" aria-live="polite"></span>

  <script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";

    const app = new App({ name: "Image Viewer", version: "1.0.0" });

    let images = [];
    let descriptions = [];
    let index = 0;

    const empty = document.getElementById("empty");
    const carousel = document.getElementById("carousel");
    const imgContainer = document.getElementById("img-container");
    const caption = document.getElementById("caption");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");
    const counter = document.getElementById("counter");

    function show(i) {
      index = i;
      const img = images[index];

      imgContainer.innerHTML = "";
      const el = document.createElement("img");
      el.src = `data:${img.mimeType || "image/jpeg"};base64,${img.data}`;
      el.alt = descriptions[index] || "Image";
      imgContainer.appendChild(el);

      caption.textContent = descriptions[index] || "";
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === images.length - 1;
      counter.textContent = images.length > 1 ? `${index + 1} / ${images.length}` : "";
    }

    prevBtn.addEventListener("click", () => { if (index > 0) show(index - 1); });
    nextBtn.addEventListener("click", () => { if (index < images.length - 1) show(index + 1); });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && index > 0) show(index - 1);
      if (e.key === "ArrowRight" && index < images.length - 1) show(index + 1);
    });

    app.ontoolresult = ({ content, structuredContent }) => {
      images = (content || []).filter((block) => block.type === "image");
      descriptions = (structuredContent?.images || []).map((r) => r.description || r.filename || "");

      if (images.length > 0) {
        empty.hidden = true;
        carousel.hidden = false;
        show(0);
      }
    };

    await app.connect();
  </script>
</body>
</html>
