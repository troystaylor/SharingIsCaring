# ============================================================================
# Copilot Studio Escalate Topic — YAML Example
# ============================================================================
#
# Import this topic into your Copilot Studio agent to enable live agent handoff.
# The topic triggers when a user asks to speak with a human, and sends the
# handoff.initiate event that the ServiceNowHandoff agent detects.
#
# HOW TO IMPORT:
#   1. Open your agent in Copilot Studio
#   2. Go to Topics > System > Escalate
#   3. Replace the default Escalate topic content with this YAML
#   4. Or create a new topic and paste this YAML
#   5. Save and Publish
#
# The Transfer conversation node at the bottom sends the handoff.initiate event
# with context variables (va_LastPhrase, va_AgentMessage) that the agent parses
# to provide conversation summary to the ServiceNow live agent.
# ============================================================================

kind: AdaptiveDialog
startBehavior: CancelOtherTopics
beginDialog:
  kind: OnEscalate
  id: main
  intent:
    displayName: Escalate
    includeInOnSelectIntent: false
    triggerQueries:
      - Talk to agent
      - Talk to a person
      - Talk to someone
      - Speak to a live agent
      - Chat with a human
      - I need a real person
      - Connect me to support
      - I want to talk to customer service
      - Can I speak to a representative
      - Transfer me to an agent
      - I need help from a person
      - Live agent please
      - Get me a human
      - This isn't working, I need a person

  actions:
    - kind: SendActivity
      id: sendMessage_escalate
      activity:
        text:
          - "I understand you'd like to speak with a live agent. Let me connect you now."

    - kind: TransferConversationV2
      id: transferConversationV2_handoff
      transferType:
        kind: TransferToAgent
        messageToAgent: "Customer requesting live agent assistance."
        context:
          kind: AutomaticTransferContext
