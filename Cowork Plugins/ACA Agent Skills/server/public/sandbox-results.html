<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; padding: 12px; background: var(--vscode-editor-background, #1e1e1e); color: var(--vscode-editor-foreground, #d4d4d4); }
.cmd { margin-bottom: 8px; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
.cmd-header { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: #252526; font-family: "Cascadia Code", "Fira Code", monospace; font-size: 12px; }
.cmd-header .status { width: 8px; height: 8px; border-radius: 50%; }
.cmd-header .status.ok { background: #4ec9b0; }
.cmd-header .status.fail { background: #f44747; }
.cmd-output { padding: 8px 10px; background: #1a1a1a; font-family: "Cascadia Code", monospace; font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 150px; overflow-y: auto; color: #ccc; }
.cmd-output.stderr { color: #f48771; }
.sandbox-id { margin-top: 10px; padding: 6px 10px; background: #252526; border-radius: 4px; font-size: 11px; color: #888; }
h2 { font-size: 14px; margin-bottom: 10px; color: #569cd6; }
</style>
</head><body>
<h2>Sandbox Execution Results</h2>
<div id="results"></div>
<div id="sandbox-info" class="sandbox-id"></div>
<script>
// MCP Apps handshake (inline, no CDN)
let initialized = false;
function sendToHost(msg) { window.parent.postMessage(msg, "*"); }

function handleToolResult(data) {
    const container = document.getElementById("results");
    const info = document.getElementById("sandbox-info");
    try {
        const parsed = JSON.parse(data.content?.[0]?.text || "{}");
        if (parsed.error) { container.innerHTML = `<div class="cmd"><div class="cmd-output stderr">${parsed.error}</div></div>`; return; }
        if (parsed.results) {
            container.innerHTML = parsed.results.map(r => `
                <div class="cmd">
                    <div class="cmd-header"><span class="status ${r.exitCode === 0 ? 'ok' : 'fail'}"></span><span>$ ${r.command}</span></div>
                    ${r.stdout ? `<div class="cmd-output">${r.stdout}</div>` : ""}
                    ${r.stderr ? `<div class="cmd-output stderr">${r.stderr}</div>` : ""}
                </div>
            `).join("");
        }
        if (parsed.sandbox_id) { info.textContent = `Sandbox: ${parsed.sandbox_id} ${parsed.reusable ? "(reusable)" : ""}`; }
    } catch (e) { container.textContent = "Parse error: " + e.message; }
    reportSize();
}

function reportSize() {
    const h = document.documentElement.scrollHeight;
    sendToHost({ jsonrpc: "2.0", method: "ui/notifications/size-changed", params: { height: h } });
}

window.addEventListener("message", (event) => {
    const msg = event.data;
    if (!msg || !msg.jsonrpc) return;
    if (msg.method === "ui/notifications/tool-result") { handleToolResult(msg.params); }
});

// Initialize handshake
sendToHost({ jsonrpc: "2.0", id: 1, method: "ui/initialize", params: {} });
window.addEventListener("message", (event) => {
    if (event.data?.id === 1 && !initialized) {
        initialized = true;
        sendToHost({ jsonrpc: "2.0", method: "ui/notifications/initialized", params: {} });
    }
});

// Auto-resize
const ro = new ResizeObserver(() => reportSize());
ro.observe(document.body);
</script>
</body></html>
