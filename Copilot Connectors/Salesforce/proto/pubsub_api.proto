// Salesforce Pub/Sub API Protocol Buffer Definition
// Source: https://github.com/developerforce/pub-sub-api/blob/main/pubsub_api.proto
// License: BSD 3-Clause

syntax = "proto3";
package eventbus.v1;

option java_multiple_files = true;
option java_package = "com.salesforce.eventbus.protobuf";
option java_outer_classname = "PubSubProto";

// --- Replay Preset ---

enum ReplayPreset {
  // Replay from the earliest available event.
  EARLIEST = 0;
  // Replay from the latest event (default).
  LATEST = 1;
  // Replay from a specific replay ID.
  CUSTOM = 2;
}

// --- Topic Info ---

message TopicInfo {
  string topic_name = 1;
  string tenant_guid = 2;
  bool can_publish = 3;
  bool can_subscribe = 4;
  string schema_id = 5;
  RpcId rpc_id = 6;
}

message TopicRequest {
  string topic_name = 1;
  RpcId rpc_id = 2;
}

// --- Schema ---

message SchemaInfo {
  string schema_json = 1;
  string schema_id = 2;
  RpcId rpc_id = 3;
}

message SchemaRequest {
  string schema_id = 1;
  RpcId rpc_id = 2;
}

// --- Publish ---

message ProducerEvent {
  string id = 1;
  string schema_id = 2;
  bytes payload = 3;
  repeated EventHeader headers = 4;
}

message EventHeader {
  string key = 1;
  bytes value = 2;
}

message PublishRequest {
  string topic_name = 1;
  repeated ProducerEvent events = 2;
  string auth_refresh = 3;
}

message PublishResponse {
  repeated PublishResult results = 1;
  string schema_id = 2;
  RpcId rpc_id = 3;
}

message PublishResult {
  bytes replay_id = 1;
  Error error = 2;
  string correlation_key = 3;
}

// --- Subscribe ---

message FetchRequest {
  string topic_name = 1;
  ReplayPreset replay_preset = 2;
  bytes replay_id = 3;
  int32 num_requested = 4;
  string auth_refresh = 5;
}

message FetchResponse {
  repeated ConsumerEvent events = 1;
  bytes latest_replay_id = 2;
  bytes replay_id = 3;
  int32 pending_num_requested = 4;
  RpcId rpc_id = 5;
}

message ConsumerEvent {
  bytes event = 1;
  bytes replay_id = 2;
}

// --- Managed Subscribe ---

message ManagedFetchRequest {
  string topic_name = 1;
  int32 num_requested = 2;
  string auth_refresh = 3;
  string developer_name = 4;
  ManagedFetchState state = 5;
  bytes replay_id = 6;
  string id = 7;
}

message ManagedFetchResponse {
  repeated ConsumerEvent events = 1;
  bytes latest_replay_id = 2;
  bytes replay_id = 3;
  int32 pending_num_requested = 4;
  RpcId rpc_id = 5;
  ManagedFetchState commit_replay_state = 6;
}

enum ManagedFetchState {
  MFS_UNSPECIFIED = 0;
  MFS_COMMIT_REPLAY = 1;
}

// --- Error ---

message Error {
  string code = 1;
  string msg = 2;
}

// --- RPC ID ---

message RpcId {
  string id = 1;
}

// --- Service ---

service PubSub {
  // Subscribe to a topic. The client sends FetchRequest messages and receives
  // FetchResponse messages. This is a bidirectional streaming RPC.
  rpc Subscribe (stream FetchRequest) returns (stream FetchResponse);

  // Get the schema for a topic by schema ID.
  rpc GetSchema (SchemaRequest) returns (SchemaInfo);

  // Get the topic info for a topic name.
  rpc GetTopic (TopicRequest) returns (TopicInfo);

  // Publish events to a topic.
  rpc Publish (PublishRequest) returns (PublishResponse);

  // Managed Subscribe to a topic with server-side replay tracking.
  rpc ManagedSubscribe (stream ManagedFetchRequest) returns (stream ManagedFetchResponse);
}
